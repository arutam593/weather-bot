# Three services so you can scale them independently:
#   • api        — stateless, behind a load balancer in production
#   • scheduler  — singleton; runs predict / observe / evaluate jobs
#   • db         — Postgres for predictions + observations
#
# Quick start:
#   docker compose up --build
#   open http://localhost:8501  (dashboard)
#   open http://localhost:8000/docs  (API)

services:

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: weather
      POSTGRES_PASSWORD: weather
      POSTGRES_DB: weather
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U weather"]
      interval: 5s
      retries: 10

  api:
    build: .
    depends_on:
      db: { condition: service_healthy }
    environment:
      WEATHER_DB_URL: postgresql+psycopg://weather:weather@db:5432/weather
    ports:
      - "8000:8000"
    volumes:
      - ./config:/app/config:ro
      - ./models_store:/app/models_store

  scheduler:
    build: .
    depends_on:
      db: { condition: service_healthy }
    command: ["python", "-m", "src.scheduler"]
    environment:
      WEATHER_DB_URL: postgresql+psycopg://weather:weather@db:5432/weather
    volumes:
      - ./config:/app/config:ro
      - ./models_store:/app/models_store

  dashboard:
    build: .
    depends_on:
      api: { condition: service_started }
    command: ["streamlit", "run", "dashboard/streamlit_app.py",
              "--server.port=8501", "--server.address=0.0.0.0"]
    ports:
      - "8501:8501"
    volumes:
      - ./config:/app/config:ro
      - ./models_store:/app/models_store

volumes:
  pgdata:
